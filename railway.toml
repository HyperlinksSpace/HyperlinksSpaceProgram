# Auto-detected by Railway at repo root (GitHub deploy + `railway up`).
# TDLib gateway only — do not use Railpack/Expo build on this service.
# Docs: https://docs.railway.com/config-as-code/reference

[build]
builder = "DOCKERFILE"
dockerfilePath = "deploy/railway/Dockerfile.tdlib-gateway"
watchPatterns = [
  "deploy/railway/**",
  "telegram/tdlib/**",
  "scripts/run-tdlib-gateway.ts",
  "scripts/load-env.ts",
  "database/telegramMessages.ts",
  "database/telegramMtproto.ts",
  "database/start.ts",
]

[deploy]
healthcheckPath = "/v1/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
