name: app-bot-tests

on:
  pull_request:
    paths:
      - "app/bot/**"
      - "app/package.json"
      - "app/package-lock.json"
  push:
    branches:
      - main
    paths:
      - "app/bot/**"
      - "app/package.json"
      - "app/package-lock.json"

jobs:
  test-bot-start-message:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci
      - run: npm run test:bot

